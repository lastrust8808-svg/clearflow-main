  <style>
    :root {
      /* Shared colors */
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;

      /* Default to dark theme */
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-interactive: var(--blue-600);
      --bg-interactive-hover: var(--blue-700);
      --text-primary: #e2e8f0;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border-primary: #334155;
      --border-secondary: #475569;
    }
    
    body.light {
      --bg-primary: #f1f5f9;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #6b7280;
      --border-primary: #e2e8f0;
      --border-secondary: #cbd5e1;
    }

    body {
      font-family: 'Saira', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    body.dark {
      background-image: radial-gradient(circle at 1px 1px, var(--border-primary) 1px, transparent 0);
      background-size: 2rem 2rem;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--border-secondary);
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #64748b; /* slate-500 */
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .btn {
      @apply font-semibold rounded-md transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2;
      focus:ring-offset-var(--bg-primary);
    }
    .btn-primary {
       background-color: var(--bg-interactive);
       @apply text-white focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed;
    }
    .btn-primary:hover {
       background-color: var(--bg-interactive-hover);
    }

    /* Welcome screen background animation */
    @keyframes gradient-animation {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animated-gradient-bg {
      background: linear-gradient(-45deg, #1e293b, #0f172a, #2563eb, #1e293b);
      background-size: 400% 400%;
      animation: gradient-animation 25s ease infinite;
    }
  </style>
