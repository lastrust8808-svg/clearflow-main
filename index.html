<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clear-Flow</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e293b">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clear-Flow">
  <script>
    // =================================================================
    // CRITICAL CONFIGURATION FOR LIVE DEPLOYMENT
    // =================================================================
    // This block MUST be updated with your actual keys and URLs for the
    // application to function correctly. The "Configuration Needed" screen
    // in the app will guide you through this process.
    window.process = {
      env: {
        // Replace with your Google OAuth 2.0 Client ID for web applications.
        GOOGLE_CLIENT_ID: '572657972176-r225vclut7gptavspci56u6m9blse6kt.apps.googleusercontent.com',
        // Replace with your Gemini API key if you are using its features.
        API_KEY: 'MOCK_API_KEY_FOR_GEMINI',
        // Plaid client ID is public, but should match your backend config.
        PLAID_CLIENT_ID: '6988ae960aba88001ee6c2c6',
        // This is the public-facing URL for your backend server.
        // For local development, this will be your ngrok URL.
        // For production, this will be your deployed server's URL.
        REACT_APP_API_BASE_URL: '%VITE_API_BASE_URL%',
      }
    };
  </script>
  <style>
    :root {
      /* Shared colors */
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;

      /* Default to dark theme */
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-interactive: var(--blue-600);
      --bg-interactive-hover: var(--blue-700);
      --text-primary: #e2e8f0;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border-primary: #334155;
      --border-secondary: #475569;
    }
    
    body.light {
      --bg-primary: #f1f5f9;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #6b7280;
      --border-primary: #e2e8f0;
      --border-secondary: #cbd5e1;
    }

    html, body, #root {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }
    body.dark {
      background-image: none;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--border-secondary);
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #64748b; /* slate-500 */
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .btn {
      @apply font-semibold rounded-md transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2;
      focus:ring-offset-var(--bg-primary);
    }
    .btn-primary {
       background-color: var(--bg-interactive);
       @apply text-white focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed;
    }
    .btn-primary:hover {
       background-color: var(--bg-interactive-hover);
    }
  </style>
</head>
<body class="dark">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
